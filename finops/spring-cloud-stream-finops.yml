specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Spring Cloud Stream
providerId: spring-cloud-stream
publisherName: Spring Cloud Stream
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Apache Kafka
  - AsyncAPI
  - Event-Driven
  - Java
  - Messaging
  - Microservices
  - RabbitMQ
  - Spring Framework
  - Stream Processing
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Spring Cloud Stream API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Spring Cloud Stream
  ServiceCategory: Developer Tools / API
  ProviderName: Spring Cloud Stream
  PublisherName: Spring Cloud Stream
  InvoiceIssuerName: Spring Cloud Stream
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Spring Cloud Stream Core API
    baseURL: https://repo.spring.io/milestone/org/springframework/cloud/spring-cloud-stream
    tags:
      - Bindings
      - Consumer Groups
      - Event-Driven
      - Functional Programming
      - Messaging
      - Microservices
    serviceName: Spring Cloud Stream Core API
    serviceCategory: API
  - name: Spring Cloud Stream Kafka Binder
    baseURL: https://kafka.apache.org
    tags:
      - Apache Kafka
      - Binder
      - Event Streaming
      - Kafka Streams
      - Messaging
    serviceName: Spring Cloud Stream Kafka Binder
    serviceCategory: API
  - name: Spring Cloud Stream RabbitMQ Binder
    baseURL: https://www.rabbitmq.com
    tags:
      - AMQP
      - Binder
      - Messaging
      - RabbitMQ
    serviceName: Spring Cloud Stream RabbitMQ Binder
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: VMware Tanzu (Spring Team)
    email: spring-cloud@vmware.com
    url: https://spring.io/team

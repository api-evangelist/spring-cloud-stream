aid: spring-cloud-stream
name: Spring Cloud Stream
description: >-
  Spring Cloud Stream is a framework for building event-driven microservices connected
  with shared messaging systems. It provides a flexible programming model built on
  established Spring idioms and best practices, including support for persistent
  pub/sub semantics, consumer groups, and stateful partitions with Apache Kafka and
  RabbitMQ binders.
image: https://spring.io/img/projects/spring-cloud.svg
url: https://spring.io/projects/spring-cloud-stream
created: '2024-01-01'
modified: '2026-05-02'
